<main class="contact-main" style="max-width: 75rem; margin: 0 auto; padding: 0 1.25rem 2.5rem; font-family: 'Roboto', sans-serif; background: #fff;">
  <section class="contact-hero" style="text-align: center; margin-bottom: 2.5rem;">
  </section>

  <section class="contact-content" style="display: flex; flex-wrap: wrap; gap: 2.5rem; justify-content: center; align-items: flex-start;">
    <!-- Contact Info -->
    <div class="contact-info" style="flex: 1; min-width: 18.75rem; margin-top: 0; padding-top: 0;">
      <h2 style="font-size: 1.4rem; color: #1a087f; margin: 0 0 1rem; padding: 0; font-weight: 500; letter-spacing: 0.03rem; line-height: 1;">Contact Info:</h2>
      <ul style="list-style: none; padding: 0; margin: 0; color: #555; font-size: 0.9rem; font-weight: 400;">
        <li style="margin-bottom: 0.9375rem; display: flex; flex-wrap: wrap; align-items: flex-start;">
          <strong style="color: #D32F2F; min-width: 8rem; font-weight: 500;">Email:</strong>
          <a href="mailto:help@wrrapd.com" style="color: #1a087f; text-decoration: underline; margin-left: 0;">help@wrrapd.com</a>
        </li>
        <li style="margin-bottom: 0.9375rem; display: flex; flex-wrap: wrap; align-items: flex-start;">
          <div style="min-width: 8rem;">
            <strong style="color: #D32F2F; font-weight: 500;">Phone/Text:</strong><br>
            <span style="color: #D32F2F; font-weight: 500;">(U.S. only)</span>
          </div>
          <div style="margin-left: 0;">
            <a href="tel:+18446385484" style="color: #1a087f; text-decoration: underline;">(844) 638-5484</a>
          </div>
        </li>
        <li style="margin-bottom: 0.9375rem; display: flex; flex-wrap: wrap; align-items: flex-start;">
          <strong style="color: #D32F2F; min-width: 8rem; font-weight: 500;">Mail:</strong>
          <div style="margin-left: 0;">
            <span style="color: #1a087f;">7901 4th St N, Ste 300</span><br>
            <span style="color: #1a087f;">St. Petersburg, FL 33702</span>
          </div>
        </li>
      </ul>
      <div class="social-links" style="margin: 1rem 0 0; padding: 0; display: flex; align-items: center; gap: 0.625rem;">
        <span style="font-size: 0.9rem; color: #D32F2F; font-weight: 500; min-width: 8rem;">Visit us on:</span>
        <a href="https://www.facebook.com/wrrapd" target="_blank" style="text-decoration: none;">
          <svg width="2rem" height="2rem" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M22 12C22 6.48 17.52 2 12 2S2 6.48 2 12c0 5.02 3.66 9.17 8.44 9.88v-6.98h-2.54v-2.9h2.54V9.56c0-2.52 1.5-3.9 3.8-3.9 1.1 0 2.25.2 2.25.2v2.48h-1.27c-1.25 0-1.64.78-1.64 1.58v1.98h2.78l-.44 2.9h-2.34v6.98C18.34 21.17 22 17.02 22 12z" fill="#1a087f"/>
          </svg>
        </a>
        <a href="https://www.x.com/wrrapd" target="_blank" style="text-decoration: none;">
          <svg width="1.75rem" height="1.75rem" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M18.24 4.15h3.39l-7.4 8.46 8.7 11.54h-6.82l-5.34-6.98-6.12 6.98H1.26l7.91-9.06-8.36-9.94h7l4.82 6.38 5.61-6.38zm-1.19 16.62h1.88L6.06 5.77H4.06l12.99 14.99z" fill="#000"/>
          </svg>
        </a>
      </div>
      <!-- Static Map Image -->
      <div class="google-map" style="margin: 1.5rem 0 0; padding: 0;">
        <a href="https://www.google.com/maps/place/7901+4th+St+N+Ste+300,+St.+Petersburg,+FL+33702" target="_blank">
          <img
            src="https://wrrapd.com/wp-content/uploads/2025/03/WrrapdHQ.png"
            alt="Map showing 7901 4th St N, Ste 300, St. Petersburg, FL 33702"
            style="width: 100%; height: 24rem; object-fit: cover; border: 0.0625rem solid #1a087f; border-radius: 0.25rem;"
          >
        </a>
      </div>
    </div>

    <!-- Contact Form -->
    <div class="contact-form" style="flex: 1; min-width: 18.75rem; background: #F5F5F5; padding: 1.25rem; border-radius: 0.5rem; box-shadow: 0 0.125rem 0.5rem rgba(0, 0, 0, 0.1); margin-top: 0; padding-top: 0;">
      <h2 style="font-size: 1.4rem; color: #1a087f; margin: 0 0 1.25rem; padding: 0; font-weight: 500; letter-spacing: 0.03rem; line-height: 1;">Send Us a Note</h2>
      <form action="#" method="POST" style="display: flex; flex-direction: column; gap: 0.75rem; margin: 0; padding: 0;">
        <div style="display: flex; flex-direction: column; gap: 0.25rem;">
          <label for="name" style="font-size: 0.9rem; color: #D32F2F; font-weight: 400;">Name</label>
          <input type="text" id="name" name="name" required style="padding: 0.625rem; font-size: 1rem; border: 0.0625rem solid #1a087f; border-radius: 0.25rem; font-family: 'Roboto', sans-serif; font-weight: 400;">
        </div>

        <div style="display: flex; flex-direction: column; gap: 0.25rem;">
          <label for="email" style="font-size: 0.9rem; color: #D32F2F; font-weight: 400;">Email</label>
          <input type="email" id="email" name="email" required style="padding: 0.625rem; font-size: 1rem; border: 0.0625rem solid #1a087f; border-radius: 0.25rem; font-family: 'Roboto', sans-serif; font-weight: 400;">
        </div>

        <div style="display: flex; flex-direction: column; gap: 0.25rem;">
          <label for="message" style="font-size: 0.9rem; color: #D32F2F; font-weight: 400;">Message</label>
          <textarea id="message" name="message" rows="5" required style="padding: 0.625rem; font-size: 1rem; border: 0.0625rem solid #1a087f; border-radius: 0.25rem; font-family: 'Roboto', sans-serif; font-weight: 400;"></textarea>
        </div>

        <button type="submit" style="padding: 0.75rem; font-size: 1.1rem; color: #fff; background: #D32F2F; border: none; border-radius: 0.25rem; cursor: pointer; font-family: 'Roboto', sans-serif; font-weight: 500; letter-spacing: 0.03rem; transition: background 0.3s;">Submit</button>
      </form>
    </div>
  </section>
</main>
