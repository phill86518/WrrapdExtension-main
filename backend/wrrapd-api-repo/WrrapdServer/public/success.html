<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful</title>
    <style>
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            background: #f9f9f9;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        img {
            width: 250px;
            max-width: 50%;
            margin-bottom: 20px;
        }

        .content h1 {
            font-size: 2.5rem;
            margin-bottom: 15px;
            color: #4caf50;
        }

        .content p {
            font-size: 1.2rem;
            line-height: 1.5;
            margin-bottom: 20px;
            max-width: 600px;
        }

        @media (max-width: 768px) {
            .content h1 {
                font-size: 2rem;
            }

            .content p {
                font-size: 1rem;
            }

            img {
                width: 200px;
            }
        }

        @media (max-width: 480px) {
            .content h1 {
                font-size: 1.8rem;
            }

            .content p {
                font-size: 0.9rem;
            }

            img {
                width: 120px;
            }
        }
    </style>
</head>
<body>
    <img src="/img/wrrapd-logo-1-small.png" alt="Wrrapd Logo">
    <div class="content">
        <h1>🎉 Payment Successful!</h1>
        <p>
            Thank you for your purchase! Your payment was completed successfully.
            You will receive a confirmation email with further details shortly.
        </p>
        <p id="redirect-message" style="font-weight: bold;">
            Re-directing to Amazon page in <span id="countdown">5</span> seconds.
            Please complete your Amazon order!
        </p>
    </div>

    <script>
        (async function notifyOpenerThenCountdown() {
            const params = new URLSearchParams(window.location.search);
            const sessionId = params.get('session_id');

            if (sessionId && window.opener) {
                try {
                    const r = await fetch(
                        'https://api.wrrapd.com/api/checkout-session-complete?session_id=' +
                            encodeURIComponent(sessionId)
                    );
                    const data = await r.json();
                    if (data.paymentIntentId) {
                        window.opener.postMessage(
                            {
                                status: 'success',
                                paymentIntentId: data.paymentIntentId,
                                customerEmail: data.customerEmail || '',
                                customerPhone: data.customerPhone || '',
                            },
                            '*'
                        );
                    }
                } catch (e) {
                    console.error('[success] notify opener failed:', e);
                }
            }

            const countdownElement = document.getElementById('countdown');
            let countdown = 5;
            const interval = setInterval(() => {
                countdown -= 1;
                countdownElement.textContent = countdown;
                if (countdown <= 0) {
                    clearInterval(interval);
                    window.close();
                }
            }, 1000);
        })();
    </script>
</body>
</html>
