<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <title>Wrrapd Payment</title>
    <script src="https://js.stripe.com/v3/"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/intl-tel-input@18.2.1/build/css/intlTelInput.css">
    <script src="https://cdn.jsdelivr.net/npm/intl-tel-input@18.2.1/build/js/intlTelInput.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            font-size: 12px; /* Reduce base font size */
            line-height: 1.4; /* Adjust line spacing */
            background-color: #f9f9f9;
        }
        #payment-form {
            max-width: 380px; /* Make form more compact */
            margin: auto;
            padding: 8px; /* Reduce form padding */
            border: 1px solid #ddd;
            background: #fff;
            border-radius: 4px;
        }
        #submit {
            background-color: #f0c14b;
            color: #111;
            font-weight: bold;
            padding: 8px; /* Reduce button padding */
            font-size: 12px; /* Reduce button text size */
            width: 100%;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 8px; /* Adjust top margin */
        }
        #total {
            font-size: 14px; /* Reduce total text size */
            font-weight: bold;
            text-align: center;
            margin-bottom: 8px;
        }
        /* Stripe split Elements (cardNumber / cardExpiry / cardCvc) — separate iframes, same pattern as classic integrations */
        .stripe-field-label {
            display: block;
            font-size: 12px;
            margin-bottom: 4px;
            font-weight: bold;
        }
        .stripe-field {
            padding: 10px 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            background: #fff;
            margin-bottom: 10px;
            min-height: 44px;
            box-sizing: border-box;
        }
        .stripe-field .StripeElement {
            min-height: 28px;
        }
        .stripe-row-split {
            display: flex;
            gap: 10px;
        }
        .stripe-row-split > div {
            flex: 1;
            min-width: 0;
        }
        .form-group {
            margin-bottom: 8px; /* Reduce margin between groups */
            margin-right: 15px; /* Adjust right margin */
        }
        .form-group label {
            display: block;
            margin-bottom: 4px; /* Reduce bottom margin of labels */
            font-size: 12px; /* Reduce label text size */
        }
        .form-group input {
            width: 100%;
            padding: 6px; /* Reduce internal padding */
            font-size: 12px; /* Reduce input text size */
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .heading-card {
            font-size: 14px; /* Reduce heading text size */
            font-weight: bold;
            margin-top: 8px; /* Reduce top margin */
        }
        .heading-address {
            font-size: 14px; /* Reduce heading text size */
            font-weight: bold;
            /* margin-top: 15px; */
            margin-bottom: 8px; /* Reduce bottom margin */
        }
        .billingAddressCheckbox {
            margin-top: 8px; /* Reduce top margin */
            margin-bottom: 15px; /* Reduce bottom margin */
        }
        .row {
            display: flex;
            justify-content: space-between;
        }
        .row .form-group {
            flex: 0 0 42%; /* Adjust element width to avoid overlap */
        }
        .row .form-group label {
            font-size: 12px; /* Reduce text size */
        }
        .row .form-group input {
            padding: 6px; /* Reduce internal padding */
            font-size: 12px; /* Reduce text size */
        }
        input:invalid {
            border-color: #ff6b6b;
        }
        
        input[type="email"],
        input[type="tel"] {
            width: 100%;
            padding: 6px;
            font-size: 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            margin-bottom: 8px;
        }
        .contact-row {
            display: flex;
            gap: 10px;
            /* margin-bottom: 8px; */
        }

        .contact-row .email-group {
            flex: 1;  /* Takes 75% of the available space */
        }

        .contact-row .phone-group {
            flex: 1;  /* Takes 25% of the available space */
        }

        .contact-row input {
            width: 100%;
        }

        .iti {
            width: 100%;
        }
        .iti__flag {
            background-image: url("https://cdn.jsdelivr.net/npm/intl-tel-input@18.2.1/build/img/flags.png");
        }
        @media (-webkit-min-device-pixel-ratio: 2), (min-resolution: 192dpi) {
            .iti__flag {
                background-image: url("https://cdn.jsdelivr.net/npm/intl-tel-input@18.2.1/build/img/flags@2x.png");
            }
        }
        
        /* Simpler phone validation styles */
        .phone-group input.error {
            border-color: #de0000;
        }
        
        .phone-group .error-message {
            color: #de0000;
            font-size: 11px;
            margin-top: 4px;
            display: none;
        }
    </style>
    
</head>
<body>
    <img src="/img/wrrapd-logo-1-small.png" alt="Wrrapd Logo" style="display: block; margin: 0 auto 0; max-width: 200px;">
    <div id="total"></div>
    <form id="payment-form">

        <!-- Card details — split Elements (Dec-style reliability vs single combined iframe) -->
        <div class="heading-card">Card Details</div>
        <label class="stripe-field-label" for="card-number-element">Card number</label>
        <div id="card-number-element" class="stripe-field"></div>
        <div class="stripe-row-split">
            <div>
                <span class="stripe-field-label">Expiry</span>
                <div id="card-expiry-element" class="stripe-field"></div>
            </div>
            <div>
                <span class="stripe-field-label">CVC</span>
                <div id="card-cvc-element" class="stripe-field"></div>
            </div>
        </div>
        <div class="form-group" style="margin-top: 8px;">
            <label for="card-zip-code">Billing ZIP Code*</label>
            <input type="text" id="card-zip-code" name="card-zip-code" required maxlength="10" pattern="[0-9-]*" placeholder="12345">
        </div>

        <!-- Add after the Card Details section and before Billing Address -->
        <div class="heading-card">Your (Gifter's) Contact Information</div>
        <div class="row contact-row">
            <div class="form-group email-group">
                <label for="email">Email Address*</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group phone-group">
                <label for="phone">Phone*</label>
                <input type="tel" id="phone" name="phone" required>
                <span class="error-message"></span>
            </div>
        </div>

        <!-- Final shipping address -->
        <div class="heading-address">Final shipping address (Giftee's address)</div>
        <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name">
        </div>
        <div class="form-group">
            <label for="line1">Address Line 1</label>
            <input type="text" id="line1" name="line1">
        </div>
        <div class="form-group">
            <label for="line2">Address Line 2</label>
            <input type="text" id="line2" name="line2">
        </div>
        <div class="row">
            <div class="form-group">
                <label for="city">City</label>
                <input type="text" id="city" name="city">
            </div>
            <div class="form-group">
                <label for="postal_code">ZIP Code</label>
                <input type="text" id="postal_code" name="postal_code">
            </div>
        </div>
        <div class="row">
            <div class="form-group">
                <label for="country">Country</label>
                <input type="text" id="country" name="country" value="US" disabled>
            </div>
            <div class="form-group">
                <label for="state">State</label>
                <input type="text" id="state" name="state" value="FL" disabled>
            </div>
        </div>

        <!-- Checkbox below Final shipping address -->
        <div class="billingAddressCheckbox">
            <label>
                <input type="checkbox" id="use-default-address" checked>Billing address same as Final shipping address
            </label>
        </div>

        <!-- Billing Address Section (hidden by default) -->
        <div id="billing-address-section" style="display: none;">
            <div class="heading-address">Billing Address</div>
            <div class="form-group">
                <label for="billing-name">Full Name</label>
                <input type="text" id="billing-name" name="billing-name">
            </div>
            <div class="form-group">
                <label for="billing-line1">Address Line 1</label>
                <input type="text" id="billing-line1" name="billing-line1">
            </div>
            <div class="form-group">
                <label for="billing-line2">Address Line 2</label>
                <input type="text" id="billing-line2" name="billing-line2">
            </div>
            <div class="row">
                <div class="form-group">
                    <label for="billing-city">City</label>
                    <input type="text" id="billing-city" name="billing-city">
                </div>
                <div class="form-group">
                    <label for="billing-postal_code">ZIP Code</label>
                    <input type="text" id="billing-postal_code" name="billing-postal_code" readonly style="background-color: #e9ecef; color: #6c757d; cursor: not-allowed;">
                </div>
            </div>
            <div class="row">
                <div class="form-group">
                    <label for="billing-country">Country</label>
                    <input type="text" id="billing-country" name="billing-country" value="US" disabled>
                </div>
                <div class="form-group">
                    <label for="billing-state">State</label>
                    <input type="text" id="billing-state" name="billing-state" value="FL" disabled>
                </div>
            </div>
        </div>

        

        <button type="submit" id="submit">Pay Now</button>
    </form>

    <script>
        // Session timeout: 15 minutes (900,000 milliseconds)
        const SESSION_TIMEOUT_MS = 15 * 60 * 1000;
        const pageLoadTime = Date.now();
        
        // Function to check if session has expired
        function isSessionExpired() {
            const elapsed = Date.now() - pageLoadTime;
            return elapsed > SESSION_TIMEOUT_MS;
        }
        
        // Function to disable submit button and show timeout message
        function handleSessionTimeout() {
            const submitButton = document.getElementById('submit');
            if (submitButton) {
                submitButton.disabled = true;
                submitButton.textContent = 'Session Expired - Please Refresh';
                submitButton.style.backgroundColor = '#ccc';
                submitButton.style.cursor = 'not-allowed';
                
                // Show alert message
                alert('Your payment session has expired (15 minutes). Please refresh the page to start a new session.');
            }
        }
        
        // Check session timeout periodically (every minute)
        setInterval(function() {
            if (isSessionExpired()) {
                handleSessionTimeout();
            }
        }, 60000); // Check every minute
        
        const stripe = Stripe('pk_test_51QUZBkCZ6tFiFwmsouyofMcNHnfeJgdA3FMmxEdhgH2sfmlQbsOSclGjS8DImpAt77cQhKyW0Ucwp4XuZfc0Jrpn00KLPjMKOO');
        const urlParams = new URLSearchParams(window.location.search);
        const encodedPayload = urlParams.get('data');

        if (!encodedPayload) {
            document.body.innerHTML = '<h1>Error: Missing payment data</h1>';
            throw new Error('Payment data not provided');
        }

        let payload;
        try {
            payload = JSON.parse(atob(encodedPayload));
        } catch (error) {
            document.body.innerHTML = '<h1>Error: Invalid payment data</h1>';
            throw new Error('Failed to decode payment data');
        }

        const { total, address, orderNumber } = payload;

        if (!total || isNaN(total)) {
            document.body.innerHTML = '<h1>Error: Invalid total amount</h1>';
            throw new Error('Total amount is invalid or missing');
        }

        document.getElementById('total').textContent = `Total: $${(total / 100).toFixed(2)}`;

        // Split Card Elements (cardNumber + cardExpiry + cardCvc) + Elements() without clientSecret — December-era pattern; confirmCardPayment gets clientSecret
        let cardNumberEl = null;
        let cardExpiryEl = null;
        let cardCvcEl = null;
        let clientSecret = null;
        let elements = null;
        let stripeInitDone = false;

        async function initializeStripeElements() {
            if (stripeInitDone) return;
            try {
                if (typeof Stripe === 'undefined') {
                    throw new Error('Stripe library not loaded. Please check your internet connection and refresh the page.');
                }

                const mountNum = document.getElementById('card-number-element');
                const mountExp = document.getElementById('card-expiry-element');
                const mountCvc = document.getElementById('card-cvc-element');
                if (!mountNum || !mountExp || !mountCvc) {
                    throw new Error('Stripe mount containers not found in DOM');
                }

                [mountNum, mountExp, mountCvc].forEach((el) => {
                    el.innerHTML = '<div style="padding:10px;text-align:center;color:#666;">Loading…</div>';
                });

                const response = await fetch('https://api.wrrapd.com/create-payment-intent', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ total, orderNumber }),
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    console.error('[Payment] API error response:', errorText);
                    throw new Error(`Failed to create payment intent: ${response.status} ${response.statusText}`);
                }

                const responseData = await response.json();
                if (!responseData.clientSecret) {
                    throw new Error('Payment intent response missing clientSecret');
                }

                clientSecret = responseData.clientSecret;
                elements = stripe.elements();

                [mountNum, mountExp, mountCvc].forEach((el) => {
                    el.innerHTML = '';
                });

                const stripeStyle = {
                    base: {
                        fontSize: '16px',
                        color: '#32325d',
                        fontFamily: 'Arial, Helvetica, sans-serif',
                        lineHeight: '24px',
                        '::placeholder': { color: '#aab7c4' },
                    },
                    invalid: { color: '#df1b41', iconColor: '#df1b41' },
                };

                cardNumberEl = elements.create('cardNumber', { style: stripeStyle });
                cardExpiryEl = elements.create('cardExpiry', { style: stripeStyle });
                cardCvcEl = elements.create('cardCvc', { style: stripeStyle });

                cardNumberEl.mount('#card-number-element');
                cardExpiryEl.mount('#card-expiry-element');
                cardCvcEl.mount('#card-cvc-element');
                stripeInitDone = true;
                
                // Set up zip code sync from card zip field to billing address
                const cardZipField = document.getElementById('card-zip-code');
                const billingZipField = document.getElementById('billing-postal_code');
                
                if (cardZipField && billingZipField) {
                    // On page load: Auto-populate billing zip from card section zip field if it has a value
                    if (cardZipField.value) {
                        billingZipField.value = cardZipField.value;
                    }
                    
                    // On input: Keep billing zip in sync with card section zip field (real-time sync)
                    cardZipField.addEventListener('input', function() {
                        // Only allow numbers and hyphens
                        this.value = this.value.replace(/[^0-9-]/g, '');
                        billingZipField.value = this.value;
                    });
                    
                    // Make billing zip read-only to prevent manual changes - show in grey area
                    billingZipField.readOnly = true;
                    billingZipField.style.backgroundColor = '#e9ecef';
                    billingZipField.style.color = '#6c757d';
                    billingZipField.style.cursor = 'not-allowed';
                    billingZipField.title = 'ZIP code is synced from Card Details above (uneditable)';
                }
                
                console.log('[Payment] Stripe split card elements mounted successfully');
            } catch (error) {
                stripeInitDone = false;
                console.error('[Payment] Error initializing Stripe elements:', error);
                const errHtml = `<div style="padding: 10px; border: 2px solid #dc3545; border-radius: 4px; background-color: #f8d7da; color: #721c24;">
                        <strong>Error loading payment form:</strong><br>
                        ${error.message}<br>
                        <button onclick="location.reload()" style="margin-top: 10px; padding: 8px 16px; background-color: #dc3545; color: white; border: none; border-radius: 4px; cursor: pointer;">Refresh Page</button>
                    </div>`;
                ['card-number-element', 'card-expiry-element', 'card-cvc-element'].forEach((id) => {
                    const el = document.getElementById(id);
                    if (el) el.innerHTML = errHtml;
                });
                alert(`Error initializing payment form: ${error.message}. Please refresh the page.`);
            }

            // Load allowed zip codes from master JSON file
            let validZipCodes = new Set();
            let zipCodesLoaded = false;
            
            async function loadAllowedZipCodes() {
                if (zipCodesLoaded) return;
                
                // Try API endpoint first
                let apiUrl = 'https://api.wrrapd.com/api/allowed-zip-codes';
                let success = false;
                
                try {
                    const response = await fetch(apiUrl);
                    console.log('[Zip Validation] API response status:', response.status);
                    
                    if (response.ok) {
                        const data = await response.json();
                        console.log('[Zip Validation] API response data:', data);
                        
                        if (data.allowedZipCodes && Array.isArray(data.allowedZipCodes)) {
                            validZipCodes = new Set(data.allowedZipCodes);
                            zipCodesLoaded = true;
                            console.log('[Zip Validation] Successfully loaded', validZipCodes.size, 'allowed zip codes from API');
                            success = true;
                        }
                    }
                } catch (error) {
                    console.warn('[Zip Validation] API endpoint failed:', error.message);
                }
                
                // If API failed, try direct JSON file access
                if (!success) {
                    try {
                        apiUrl = 'https://api.wrrapd.com/data/allowed-zip-codes.json';
                        const response = await fetch(apiUrl);
                        
                        if (response.ok) {
                            const data = await response.json();
                            if (data.allowedZipCodes && Array.isArray(data.allowedZipCodes)) {
                                validZipCodes = new Set(data.allowedZipCodes);
                                zipCodesLoaded = true;
                                console.log('[Zip Validation] Successfully loaded', validZipCodes.size, 'allowed zip codes from JSON file');
                                success = true;
                            }
                        }
                    } catch (error) {
                        console.error('[Zip Validation] Both API and direct file access failed:', error.message);
                    }
                }
                
                if (!success) {
                    console.error('[Zip Validation] CRITICAL: Could not load zip codes from master file. Validation will not work.');
                    validZipCodes = new Set(); // Empty set - validation will fail
                }
            }

            // Validate zip code against allowable shipping zip codes
            function validateShippingZipCode(zipCode) {
                if (!zipCode) {
                    return { valid: false, message: 'ZIP code is required' };
                }

                // Extract 5-digit zip code (handle formats like 32226-6067 or 32226)
                const zip = zipCode.replace(/[^0-9]/g, '').substring(0, 5);
                
                if (zip.length !== 5) {
                    return { valid: false, message: 'Invalid ZIP code format. Please enter a 5-digit ZIP code.' };
                }

                // Check if zip codes are loaded
                if (validZipCodes.size === 0) {
                    console.warn('[Zip Validation] Zip codes not loaded. Current size:', validZipCodes.size);
                    console.warn('[Zip Validation] Attempting to reload...');
                    // Try to reload (won't block, but will trigger reload)
                    loadAllowedZipCodes().catch(err => console.error('[Zip Validation] Reload error:', err));
                    return { valid: false, message: 'Validating zip code... Please try again in a moment.' };
                }

                console.log('[Zip Validation] Checking zip code:', zip, 'against', validZipCodes.size, 'allowed codes');
                console.log('[Zip Validation] Is in set?', validZipCodes.has(zip));
                
                if (!validZipCodes.has(zip)) {
                    return { 
                        valid: false, 
                        message: 'Wrrapd is currently working on delivering to additional zip codes, but can\'t currently deliver to that zip code. Please enter a different ZIP code.' 
                    };
                }

                return { valid: true };
            }

            // Load zip codes first, then set default address
            await loadAllowedZipCodes();

            const setDefaultAddress = () => {
                document.getElementById('name').value = address.name || '';
                // document.getElementById('country').value = 'US';
                document.getElementById('line1').value = address.street || '';
                document.getElementById('line2').value = '';
                document.getElementById('city').value = address.city || '';
                // document.getElementById('state').value = address.state || '';
                document.getElementById('postal_code').value = address.postalCode || '';
            };

            const clearBillingAddressFields = () => {
                document.getElementById('billing-name').value = '';
                document.getElementById('billing-line1').value = '';
                document.getElementById('billing-line2').value = '';
                document.getElementById('billing-city').value = '';
                document.getElementById('billing-postal_code').value = '';
            };

            // Handle checkbox change - show/hide billing address section
            document.getElementById('use-default-address').addEventListener('change', (event) => {
                const billingSection = document.getElementById('billing-address-section');
                const billingZipField = document.getElementById('billing-postal_code');
                
                if (event.target.checked) {
                    // Hide billing address section
                    billingSection.style.display = 'none';
                    // Clear billing fields
                    clearBillingAddressFields();
                } else {
                    // Show billing address section
                    billingSection.style.display = 'block';
                    // Auto-fill billing address fields with Amazon default address
                    if (payload && payload.address) {
                        document.getElementById('billing-name').value = payload.address.name || '';
                        document.getElementById('billing-line1').value = payload.address.street ? payload.address.street.split(',')[0] : '';
                        document.getElementById('billing-line2').value = '';
                        document.getElementById('billing-city').value = payload.address.city || '';
                        // Don't set postal_code from payload - it should come from card zip field
                        document.getElementById('billing-state').value = payload.address.state || '';
                        // Normalize country code to ISO format (US, not "United States")
                        const countryCode = payload.address.country || 'US';
                        const normalizedCountry = (countryCode === 'United States' || countryCode === 'USA') ? 'US' : 
                                                   (countryCode === 'Canada' || countryCode === 'CA') ? 'CA' : countryCode;
                        document.getElementById('billing-country').value = normalizedCountry;
                    }
                    
                    // Ensure billing zip remains read-only (will be synced from Stripe card element during payment)
                    if (billingZipField) {
                        billingZipField.readOnly = true;
                        billingZipField.style.backgroundColor = '#e9ecef';
                        billingZipField.style.color = '#6c757d';
                        billingZipField.style.cursor = 'not-allowed';
                        billingZipField.title = 'ZIP code is synced from Card Details above (uneditable)';
                    }
                }
            });

            // Load zip codes first, then set default address
            await loadAllowedZipCodes();

            setDefaultAddress();

            // Add zip code validation for Final shipping address
            const postalCodeField = document.getElementById('postal_code');
            const postalCodeError = document.createElement('div');
            postalCodeError.style.cssText = 'color: #ff6b6b; font-size: 11px; margin-top: 4px; display: none;';
            postalCodeField.parentElement.appendChild(postalCodeError);

            if (postalCodeField) {
                // Validate on blur and prevent leaving field if invalid
                postalCodeField.addEventListener('blur', function(e) {
                    const validation = validateShippingZipCode(this.value);
                    if (!validation.valid && this.value.trim() !== '') {
                        postalCodeError.textContent = validation.message;
                        postalCodeError.style.display = 'block';
                        this.style.borderColor = '#ff6b6b';
                        // Keep focus on the field - prevent blur
                        setTimeout(() => {
                            this.focus();
                        }, 10);
                    } else {
                        postalCodeError.style.display = 'none';
                        this.style.borderColor = '#ccc';
                    }
                });

                // Clear error on input
                postalCodeField.addEventListener('input', function() {
                    if (postalCodeError.style.display === 'block') {
                        postalCodeError.style.display = 'none';
                        this.style.borderColor = '#ccc';
                    }
                });

                // Also validate on keypress to prevent invalid characters
                postalCodeField.addEventListener('keypress', function(e) {
                    // Allow: backspace, delete, tab, escape, enter, and numbers
                    if ([8, 9, 27, 13, 46].indexOf(e.keyCode) !== -1 ||
                        (e.keyCode === 65 && e.ctrlKey === true) || // Allow: Ctrl+A
                        (e.keyCode >= 35 && e.keyCode <= 39)) { // Allow: home, end, left, right
                        return;
                    }
                    // Ensure that it is a number and stop the keypress
                    if ((e.shiftKey || (e.keyCode < 48 || e.keyCode > 57)) && (e.keyCode < 96 || e.keyCode > 105)) {
                        e.preventDefault();
                    }
                });
            }

            const phoneInput = window.intlTelInput(document.querySelector("#phone"), {
                utilsScript: "https://cdn.jsdelivr.net/npm/intl-tel-input@18.2.1/build/js/utils.js",
                preferredCountries: ["us"],
                separateDialCode: true,
                initialCountry: "us",
                formatOnDisplay: true
            });

            const phoneElement = document.querySelector("#phone");
            const errorMsg = document.querySelector(".phone-group .error-message");

            // Prevent non-numeric input except + and spaces
            phoneElement.addEventListener("keypress", function(e) {
                const char = String.fromCharCode(e.which);

                                         errorField === 'name' ? 'name' : 
                                         errorField === 'city' ? 'city' : 
                                         errorField === 'state' ? 'state' : 
                                         errorField === 'country' ? 'country' : 'line1';
                        const fieldElement = document.getElementById(fieldId);
                        
                        if (!fieldElement) {
                            console.error(`[Payment] Could not find Final shipping address field: ${fieldId}`);
                            return;
                        }
                        
                        // Check if field was auto-corrected - if ZIP was corrected, don't show stale ZIP mismatch error
                        if (errorField === 'postal_code' && shippingValidation.suggestedZip) {
                            const currentZip = document.getElementById('postal_code').value;
                            // If ZIP was corrected and now matches the suggestion, but error message still mentions old ZIP
                            if (currentZip === shippingValidation.suggestedZip && 
                                shippingValidation.message && 
                                shippingValidation.message.includes('ZIP code mismatch')) {
                                // Extract the old ZIP from the error message
                                const oldZipMatch = shippingValidation.message.match(/you entered (\d+)/);
                                if (oldZipMatch && oldZipMatch[1] !== currentZip) {
                                    // This is a stale error - ZIP was already corrected
                                    // Don't show this error, validation will pass on next attempt
                                    console.log(`[Payment] Final shipping ZIP code was auto-corrected from ${oldZipMatch[1]} to ${currentZip}, clearing stale error`);
                                    fieldElement.style.borderColor = '';
                                    fieldElement.style.borderWidth = '';
                                    const staleErrorDiv = fieldElement.parentElement.querySelector('.field-error');
                                    if (staleErrorDiv) {
                                        staleErrorDiv.remove();
                                    }
                                    // Re-validate will happen on next click
                                    submitButton.disabled = false;
                                    submitButton.textContent = 'Pay Now';
                                    return;
                                }
                            }
                        }
                        
                        // Add error styling
                        fieldElement.style.borderColor = '#dc3545';
                        fieldElement.style.borderWidth = '2px';
                        
                        // Show error message below field
                        let errorDiv = fieldElement.parentElement.querySelector('.field-error');
                        if (!errorDiv) {
                            errorDiv = document.createElement('div');
                            errorDiv.className = 'field-error';
                            errorDiv.style.color = '#dc3545';
                            errorDiv.style.fontSize = '14px';
                            errorDiv.style.marginTop = '5px';
                            errorDiv.style.fontWeight = 'bold';
                            fieldElement.parentElement.appendChild(errorDiv);
                        }
                        errorDiv.textContent = shippingValidation.message;
                        
                        fieldElement.focus();
                        submitButton.disabled = false;
                        submitButton.textContent = 'Pay Now';
                        return; // Require user to click 'Pay Now' again with corrected address
                        }
                    }
                    
                    // Clear any previous errors from Final shipping address (validation passed)
                    // Only clear Final shipping address errors, NOT billing address errors
                    // Use a more specific selector to avoid clearing billing errors
                    const finalShippingErrors = document.querySelectorAll('#payment-form .field-error');
                    finalShippingErrors.forEach(el => {
                        // Only remove if it's NOT inside the billing address section
                        if (!el.closest('#billing-address-section')) {
                            el.remove();
                        }
                    });
                    // Clear confirmation messages from Final shipping address (validation passed, corrections applied)
                    const finalShippingConfirmations = document.querySelectorAll('#payment-form .field-confirmation');
                    finalShippingConfirmations.forEach(el => {
                        // Only remove if it's NOT inside the billing address section
                        if (!el.closest('#billing-address-section')) {
                            el.remove();
                        }
                    });
                    // Clear border styles from Final shipping address fields only
                    const finalShippingFields = document.querySelectorAll('#payment-form input:not(#billing-address-section input), #payment-form select:not(#billing-address-section select)');
                    finalShippingFields.forEach(el => {
                        el.style.borderColor = '';
                        el.style.borderWidth = '';
                    });

                    // Determine billing address - use billing section if checkbox is unchecked, otherwise use Final shipping address
                    const useDefaultBilling = document.getElementById('use-default-address').checked;
                    
                    let billingAddress = null;
                    if (!useDefaultBilling) {
                        // Normalize country code to ISO format before validation
                        const billingCountryRaw = document.getElementById('billing-country').value || 'US';
                        const billingCountryNormalized = (billingCountryRaw === 'United States' || billingCountryRaw === 'USA') ? 'US' : 
                                                          (billingCountryRaw === 'Canada' || billingCountryRaw === 'CA') ? 'CA' : billingCountryRaw;
                        
                        billingAddress = {
                            name: document.getElementById('billing-name').value,
                            line1: document.getElementById('billing-line1').value,
                            line2: document.getElementById('billing-line2').value,
                            city: document.getElementById('billing-city').value,
                            state: document.getElementById('billing-state').value,
                            postal_code: document.getElementById('billing-postal_code').value,
                            country: billingCountryNormalized
                        };
                        
                        // Update the field with normalized value
                        document.getElementById('billing-country').value = billingCountryNormalized;

                        submitButton.textContent = 'Validating billing address...';
                        const billingValidation = await validateAddress(billingAddress, 'Billing address');
                        if (!billingValidation.valid) {
                            // CRITICAL: Clear any previous errors from billing address FIRST
                            // Also clear any billing errors that might have been incorrectly placed in Final shipping section
                            document.querySelectorAll('#billing-address-section .field-error').forEach(el => el.remove());
                            // Also remove any billing-related errors from Final shipping section (they shouldn't be there)
                            document.querySelectorAll('#payment-form .field-error').forEach(el => {
                                const errorText = el.textContent || '';
                                // If error mentions billing or is in a billing context, remove it from Final shipping section
                                if (errorText.includes('billing') || errorText.includes('Billing') || 
                                    (el.closest('#billing-address-section') === null && 
                                     (errorText.includes('ZIP code should match') || errorText.includes('Card Details')))) {
                                    // This is a billing error in wrong location - remove it
                                    el.remove();
                                }
                            });
                            document.querySelectorAll('#billing-address-section input, #billing-address-section select').forEach(el => {
                                el.style.borderColor = '';
                                el.style.borderWidth = '';
                            });
                            
                            // Auto-correct address fields if corrections are available
                            // NEVER auto-correct postal_code - it comes from card section zip code
                            let hasBillingCorrections = false;
                            if (billingValidation.correctedComponents) {
                                const corrected = billingValidation.correctedComponents;
                                // Skip postal_code - it's synced from card section and should never be auto-corrected
                                if (corrected.city) {
                                    document.getElementById('billing-city').value = corrected.city;
                                    hasBillingCorrections = true;
                                }
                                if (corrected.state) {
                                    document.getElementById('billing-state').value = corrected.state;
                                    hasBillingCorrections = true;
                                }
                                if (corrected.line1) {
                                    document.getElementById('billing-line1').value = corrected.line1;
                                    hasBillingCorrections = true;
                                }
                                if (corrected.line2 !== undefined) {
                                    document.getElementById('billing-line2').value = corrected.line2 || '';
                                    hasBillingCorrections = true;
                                }
                            }
                            
                            // NEVER auto-correct ZIP code - it comes from card section
                            // If ZIP code correction was suggested, show message to check card section
                            
                            // Show confirmation messages for auto-corrected billing fields
                            // Never show confirmation for postal_code - it's synced from card section
                            if (hasBillingCorrections && billingValidation.correctedComponents) {
                                const corrected = billingValidation.correctedComponents;
                                if (corrected.line1) {
                                    showFieldConfirmation('billing-line1', 'Address has been corrected');
                                }
                                // Skip postal_code confirmation - it comes from card section
                                if (corrected.city) {
                                    showFieldConfirmation('billing-city', 'City has been corrected');
                                }
                                if (corrected.state) {
                                    showFieldConfirmation('billing-state', 'State has been corrected');
                                }
                            }
                            
                            // If validation failed due to ZIP mismatch, show message to check card section
                            if (billingValidation.message && (billingValidation.message.includes('ZIP code') || billingValidation.field === 'postal_code')) {
                                // Show error message directing user to check card section
                                const billingZipField = document.getElementById('billing-postal_code');
                                if (billingZipField) {
                                    // Remove any existing error for this field
                                    const existingError = billingZipField.parentNode.querySelector('.field-error');
                                    if (existingError) {
                                        existingError.remove();
                                    }
                                    const errorDiv = document.createElement('div');
                                    errorDiv.className = 'field-error';
                                    errorDiv.textContent = 'Please check your billing address. ZIP code should match the one entered in Card Details above.';
                                    billingZipField.parentNode.insertBefore(errorDiv, billingZipField.nextSibling);
                                    billingZipField.style.borderColor = '#dc3545';
                                    billingZipField.style.borderWidth = '2px';
                                }
                                billingValidation.message = 'Please check your billing address. ZIP code should match the one entered in Card Details above.';
                            }
                            
                            // Show error message in the form field (AFTER auto-correction)
                            // Map field names - validateAddress returns 'line1', 'postal_code', etc. without 'billing-' prefix
                            let errorField = billingValidation.field || 'line1';
                            // Always add 'billing-' prefix for billing address fields
                            if (!errorField.startsWith('billing-')) {
                                errorField = 'billing-' + errorField;
                            }
                            
                            const fieldId = errorField === 'billing-postal_code' ? 'billing-postal_code' : 
                                               errorField === 'billing-name' ? 'billing-name' : 
                                               errorField === 'billing-city' ? 'billing-city' : 
                                               errorField === 'billing-state' ? 'billing-state' : 
                                               errorField === 'billing-country' ? 'billing-country' : 
                                               'billing-line1';
                            
                            console.log(`[Payment] Billing address error field mapping: original field="${billingValidation.field}", mapped errorField="${errorField}", fieldId="${fieldId}"`);
                            
                            // CRITICAL: Use querySelector within billing section to ensure we get the right field
                            const billingSection = document.getElementById('billing-address-section');
                            let fieldElement = null;
                            if (billingSection) {
                                fieldElement = billingSection.querySelector(`#${fieldId}`);
                            }
                            // Fallback to getElementById if not found in section
                            if (!fieldElement) {
                                fieldElement = document.getElementById(fieldId);
                            }
                            
                            if (!fieldElement) {
                                console.error(`[Payment] Could not find billing field element for: ${fieldId}, using billing-line1`);
                                fieldElement = billingSection ? billingSection.querySelector('#billing-line1') : document.getElementById('billing-line1');
                            }
                            
                            // CRITICAL: Ensure we're using the field from within the billing address section
                            // Re-fetch the field element from within billing section to ensure it's the correct one
                            if (!billingSection) {
                                console.error(`[Payment] ERROR: Billing address section not found!`);
                                submitButton.disabled = false;
                                submitButton.textContent = 'Pay Now';
                                return;
                            }
                            
                            // Always get the field from within the billing section FIRST
                            let correctFieldElement = billingSection.querySelector(`#${fieldId}`);
                            if (!correctFieldElement) {
                                console.error(`[Payment] Could not find billing field ${fieldId} in billing section, trying getElementById`);
                                correctFieldElement = document.getElementById(fieldId);
                                // Double-check it's actually in the billing section
                                if (correctFieldElement && !billingSection.contains(correctFieldElement)) {
                                    console.error(`[Payment] Field ${fieldId} found but NOT in billing section! Using billing-line1 as fallback`);
                                    correctFieldElement = billingSection.querySelector('#billing-line1');
                                }
                            }
                            
                            if (!correctFieldElement) {
                                console.error(`[Payment] Could not find any billing field. Using billing-line1 as last resort`);
                                correctFieldElement = billingSection.querySelector('#billing-line1') || document.getElementById('billing-line1');
                            }
                            
                            // Verify the field is in the billing section
                            if (correctFieldElement && billingSection && !billingSection.contains(correctFieldElement)) {
                                console.error(`[Payment] CRITICAL ERROR: Field element is NOT in billing address section!`);
                                // Force find it in billing section
                                const forcedField = billingSection.querySelector(`input[id*="${errorField.replace('billing-', '')}"]`);
                                if (forcedField) {
                                    correctFieldElement = forcedField;
                                    console.log(`[Payment] Found field using forced search:`, forcedField.id);
                                } else {
                                    console.error(`[Payment] Could not find field in billing section. Aborting error display.`);
                                    submitButton.disabled = false;
                                    submitButton.textContent = 'Pay Now';
                                    return;
                                }
                            }
                            
                            // Use the correct field element
                            fieldElement = correctFieldElement;
                            
                            // Check if field was auto-corrected - if ZIP was corrected, don't show stale ZIP mismatch error
                            if (errorField === 'billing-postal_code' && billingValidation.suggestedZip) {
                                const currentZip = document.getElementById('billing-postal_code').value;
                                // If ZIP was corrected and now matches the suggestion, but error message still mentions old ZIP
                                if (currentZip === billingValidation.suggestedZip && 
                                    billingValidation.message && 
                                    billingValidation.message.includes('ZIP code mismatch')) {
                                    // Extract the old ZIP from the error message
                                    const oldZipMatch = billingValidation.message.match(/you entered (\d+)/);
                                    if (oldZipMatch && oldZipMatch[1] !== currentZip) {
                                        // This is a stale error - ZIP was already corrected
                                        // Don't show this error, validation will pass on next attempt
                                        console.log(`[Payment] Billing ZIP code was auto-corrected from ${oldZipMatch[1]} to ${currentZip}, clearing stale error`);
                                        fieldElement.style.borderColor = '';
                                        fieldElement.style.borderWidth = '';
                                        const staleErrorDiv = fieldElement.parentElement.querySelector('.field-error');
                                        if (staleErrorDiv) {
                                            staleErrorDiv.remove();
                                        }
                                        // Re-validate will happen on next click
                                        submitButton.disabled = false;
                                        submitButton.textContent = 'Pay Now';
                                        return;
                                    }
                                }
                            }
                            
                            // Add error styling to the correct field (ONLY after we've verified it's in billing section)
                            fieldElement.style.borderColor = '#dc3545';
                            fieldElement.style.borderWidth = '2px';
                            
                            // Show appropriate error message for billing address
                            // Format message similar to Final shipping address validation
                            let billingErrorMessage = '';
                            
                            // If error message contains "Address validation found issues", use it directly
                            if (billingValidation.message && billingValidation.message.includes('Address validation found issues')) {
                                billingErrorMessage = billingValidation.message;
                            } else if (billingValidation.message && (billingValidation.message.includes('ZIP code') || billingValidation.field === 'postal_code')) {
                                // If error is about ZIP code, reference card section
                                billingErrorMessage = 'Address validation found issues: ZIP code mismatch. Please check your billing address. ZIP code should match the one entered in Card Details above.';
                            } else if (billingValidation.message && !billingValidation.message.includes('ZIP code')) {
                                // Use the validation message if it's not about ZIP code, but prefix with "Address validation found issues:"
                                if (billingValidation.message.includes('inferred components') || 
                                    billingValidation.message.includes('unconfirmed components') ||
                                    billingValidation.message.includes('replaced components')) {
                                    billingErrorMessage = billingValidation.message;
                                } else {
                                    billingErrorMessage = 'Address validation found issues: ' + billingValidation.message;
                                }
                            } else {
                                billingErrorMessage = 'Address validation found issues. Please re-check your Billing address.';
                            }
                            
                            // CRITICAL: Show error message below the correct field IN THE BILLING SECTION
                            // Ensure we're working within the billing address section
                            const billingSection = document.getElementById('billing-address-section');
                            if (!billingSection || !billingSection.contains(fieldElement)) {
                                console.error(`[Payment] CRITICAL: Field element is not in billing section! Finding correct field...`);
                                // Try to find the field within billing section
                                const correctField = billingSection.querySelector(`#${fieldId}`);
                                if (correctField) {
                                    fieldElement = correctField;
                                } else {
                                    console.error(`[Payment] Could not find field ${fieldId} in billing section`);
                                    submitButton.disabled = false;
                                    submitButton.textContent = 'Pay Now';
                                    return;
                                }
                            }
                            
                            // Remove any existing error messages from Final shipping section that might be billing-related
                            document.querySelectorAll('#payment-form .field-error').forEach(el => {
                                // If error is NOT in billing section but mentions billing, remove it
                                if (!el.closest('#billing-address-section')) {
                                    const errorText = el.textContent || '';
                                    if (errorText.includes('billing') || errorText.includes('Billing') || 
                                        errorText.includes('ZIP code should match') || errorText.includes('Card Details')) {
                                        console.log(`[Payment] Removing billing error from Final shipping section:`, errorText);
                                        el.remove();
                                    }
                                }
                            });
                            
                            // Show error message below the correct field IN BILLING SECTION
                            let errorDiv = fieldElement.parentElement.querySelector('.field-error');
                            if (!errorDiv) {
                                errorDiv = document.createElement('div');
                                errorDiv.className = 'field-error';
                                errorDiv.style.color = '#dc3545';
                                errorDiv.style.fontSize = '14px';
                                errorDiv.style.marginTop = '5px';
                                errorDiv.style.fontWeight = 'bold';
                                fieldElement.parentElement.appendChild(errorDiv);
                            }
                            errorDiv.textContent = billingErrorMessage;
                            
                            console.log(`[Payment] Displaying billing address error on field: ${fieldId}, element:`, fieldElement, 'in billing section:', billingSection.contains(fieldElement));
                            fieldElement.focus();
                            submitButton.disabled = false;
                            submitButton.textContent = 'Pay Now';
                            return; // Require user to click 'Pay Now' again with corrected address
                        }
                        
                        // Clear any previous errors and confirmations from billing address (validation passed)
                        document.querySelectorAll('#billing-address-section .field-error').forEach(el => el.remove());
                        document.querySelectorAll('#billing-address-section .field-confirmation').forEach(el => el.remove());
                        document.querySelectorAll('#billing-address-section input, #billing-address-section select').forEach(el => {
                            el.style.borderColor = '';
                            el.style.borderWidth = '';
                        });
                    }

                    // All validations passed - proceed with payment
                    submitButton.textContent = 'Processing payment...';
                    
                    // Build billing details - ensure billingAddress is not null when useDefaultBilling is false
                    if (!useDefaultBilling && !billingAddress) {
                        alert('Billing address is required. Please fill in all billing address fields.');
                        submitButton.disabled = false;
                        submitButton.textContent = 'Pay Now';
                        return;
                    }
                    
                    // Get zip code from card section zip field (source of truth)
                    const cardZipField = document.getElementById('card-zip-code');
                    let cardZipCode = '';
                    
                    // Get value from card zip field (source of truth)
                    if (cardZipField) {
                        cardZipCode = cardZipField.value.trim() || '';
                    }
                    
                    // Ensure billing zip is synced
                    const billingZipField = document.getElementById('billing-postal_code');
                    if (billingZipField && cardZipCode) {
                        billingZipField.value = cardZipCode;
                    }
                    
                    // Fallback to billing field if card zip is empty
                    if (!cardZipCode && billingZipField) {
                        cardZipCode = billingZipField.value || '';
                    }
                    
                    // Final fallback to other sources
                    if (!cardZipCode) {
                        cardZipCode = useDefaultBilling ? finalShippingAddress.postal_code : (billingAddress ? billingAddress.postal_code : '');
                    }
                    
                    const billingDetails = {
                        name: useDefaultBilling ? finalShippingAddress.name : (billingAddress ? billingAddress.name : ''),
                        email: email,
                        phone: phone,
                        address: {
                            line1: useDefaultBilling ? finalShippingAddress.line1 : (billingAddress ? billingAddress.line1 : ''),
                            line2: useDefaultBilling ? (finalShippingAddress.line2 || '') : (billingAddress ? (billingAddress.line2 || '') : ''),
                            city: useDefaultBilling ? finalShippingAddress.city : (billingAddress ? billingAddress.city : ''),
                            state: useDefaultBilling ? finalShippingAddress.state : (billingAddress ? billingAddress.state : ''),
                            postal_code: cardZipCode,
                            country: useDefaultBilling ? finalShippingAddress.country : (billingAddress ? billingAddress.country : 'US')
                        }
                };

                if (!cardNumberEl || !elements) {
                    alert('Payment form not fully loaded. Please wait a moment and try again.');
                    submitButton.disabled = false;
                    submitButton.textContent = 'Pay Now';
                    return;
                }

                if (!clientSecret) {
                    alert('Payment session expired. Please refresh the page.');
                    submitButton.disabled = false;
                    submitButton.textContent = 'Pay Now';
                    return;
                }

                const { paymentIntent, error } = await stripe.confirmCardPayment(clientSecret, {
                    payment_method: {
                        card: cardNumberEl,
                        billing_details: billingDetails,
                    },
                });

                if (error) {
                    alert(`Payment failed: ${error.message}`);
                    submitButton.disabled = false;
                    submitButton.textContent = 'Pay Now';
                    return;
                }
                    
                    // Payment successful - send Final shipping address to server
                    // Send Final shipping address directly to server (bypassing content.js)
                    const finalShippingAddressForServer = {
                        name: finalShippingAddress.name,
                        street: finalShippingAddress.line1 + (finalShippingAddress.line2 ? ' ' + finalShippingAddress.line2 : ''),
                        city: finalShippingAddress.city,
                        state: finalShippingAddress.state,
                        postalCode: finalShippingAddress.postal_code,
                        country: finalShippingAddress.country
                    };
                    
                    // Store Final shipping address on server associated with orderNumber
                    try {
                        await fetch('https://api.wrrapd.com/api/store-final-shipping-address', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                orderNumber: orderNumber,
                                finalShippingAddress: finalShippingAddressForServer
                            })
                        });
                        console.log('[Checkout] Final shipping address sent directly to server');
                    } catch (error) {
                        console.error('[Checkout] Error sending Final shipping address to server:', error);
                        // Continue anyway - content.js can still send it
                    }
                    
                    // Update the postMessage to include contact info (Final shipping address sent directly to server)
                    if (window.opener) {
                        window.opener.postMessage(
                            { 
                                status: 'success', 
                                paymentIntentId: paymentIntent.id,
                                customerEmail: email,
                                customerPhone: phone
                            }, 
                            '*'
                        );
                    }

                    window.location.href = '/success';
                } catch (error) {
                    console.error('[Payment] Error during payment process:', error);
                    alert('An error occurred during payment. Please try again.');
                    submitButton.disabled = false;
                    submitButton.textContent = 'Pay Now';
                }
            });
        }

        // Wait for Stripe library to load before initializing
        function waitForStripeAndInitialize() {
            if (typeof Stripe !== 'undefined' && document.readyState === 'complete') {
        initializeStripeElements();
            } else if (typeof Stripe !== 'undefined') {
                // Stripe loaded but DOM might not be ready
                if (document.readyState === 'loading') {
                    document.addEventListener('DOMContentLoaded', initializeStripeElements);
                } else {
                    initializeStripeElements();
                }
            } else {
                // Stripe not loaded yet, wait a bit and retry
                setTimeout(waitForStripeAndInitialize, 100);
            }
        }

        // Start initialization when DOM is ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', waitForStripeAndInitialize);
        } else {
            waitForStripeAndInitialize();
        }
    </script>
</body>
</html>
