<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Canceled</title>
    <style>
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            background: white;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            position: relative;
        }

        img {
            width: 250px; /* Larger logo */
            position: absolute;
            top: 15%; /* Position the logo slightly higher */
        }

        .content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .content h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            color: #d32f2f; /* Red color for cancellation */
        }

        .content p {
            font-size: 1.5rem;
        }
    </style>
</head>
<body>
    <img src="/img/wrrapd-logo-1-small.png" alt="Wrrapd Logo">
    <div class="content">
        <h1>❌ Payment Canceled</h1>
        <p>Your payment was canceled. Please try again if needed.</p>
    </div>
</body>
</html>
