                };
                console.log('[wrrapd checkout][debug]', snap);
                const panel = document.getElementById('wrrapd-checkout-debug-panel');
                if (panel) {
                    panel.style.display = 'block';
                    panel.textContent = JSON.stringify(snap, null, 2);
                }
            }

            updatePayButtonState = function () {
                const submit = document.getElementById('submit');
                const hintEl = document.getElementById('pay-status-hint');
                const setHint = function (text, blocked) {
                    if (!hintEl) return;
                    hintEl.textContent = text || '';
                    hintEl.classList.toggle('pay-status-hint--blocked', !!blocked);
                };
                try {
                    if (isSessionExpired()) {
                        submit.disabled = true;
                        setHint('Session expired — refresh the page.', true);
                        return;
                    }
                    const emailOk = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(document.getElementById('email').value.trim());
                    const phoneOk = isPhoneOkForPay();
                    if (!emailOk) {
                        submit.disabled = true;
                        setHint('Enter a valid email address.', true);
                        return;
                    }
                    if (!phoneOk) {
                        submit.disabled = true;
                        setHint('Enter a valid phone (10 digits for US). Wait a second after the page loads if the flag just appeared.', true);
                        return;
                    }
                    if (!stripeCardComplete) {
                        submit.disabled = true;
                        setHint('Finish entering card number, expiry, and CVC.', true);
                        return;
                    }
                    if (validZipCodes.size === 0) {
                        submit.disabled = true;
                        setHint('Could not load the delivery ZIP list from api.wrrapd.com. Check your connection and refresh.', true);
                        return;
                    }
                    const zipOk = validateShippingZipCode(document.getElementById('postal_code').value).valid;
                    if (!zipOk) {
                        submit.disabled = true;
                        const zm = validateShippingZipCode(document.getElementById('postal_code').value).message;
                        setHint(zm || 'ZIP is not in the delivery area or is invalid.', true);
                        return;
                    }
                    const gifteeFilled =
                        document.getElementById('name').value.trim() &&
                        document.getElementById('line1').value.trim() &&
                        document.getElementById('city').value.trim() &&
                        document.getElementById('state').value.trim();
                    if (!gifteeFilled) {
                        submit.disabled = true;
                        setHint('Fill giftee name, street address, city, and state.', true);
                        return;
                    }
                    const gifteeOk = zipOk && gifteeFilled && gifteeGoogleValidated;

                    const useDefaultBilling = document.getElementById('use-default-address').checked;
                    let billingOk;
                    if (useDefaultBilling) {
                        billingOk = gifteeOk;
                    } else {
                        const bFilled =
                            document.getElementById('billing-name').value.trim() &&
                            document.getElementById('billing-line1').value.trim() &&
                            document.getElementById('billing-city').value.trim() &&
                            document.getElementById('billing-state').value.trim() &&
                            document.getElementById('billing-postal_code').value.trim();
                        billingOk = bFilled && billingGoogleValidated;
                    }

                    if (!gifteeGoogleValidated) {
                        submit.disabled = true;
                        setHint(
                            lastGifteeValidationHint ||
                                'Checking delivery address with Google… If this stays stuck, open DevTools (F12) → Console for errors.',
                            true,
                        );
                        return;
                    }
                    if (!billingOk) {
                        submit.disabled = true;
                        setHint('Billing address is not verified yet, or fields are incomplete.', true);
                        return;
                    }

                    submit.disabled = false;
                    setHint('Ready — click Pay Now to charge the card.', false);
                } finally {
                    logCheckoutPayDebugSnapshot();
                }
            };

            /**
             * Address autocomplete via Google Places (database-backed quality).
             * Keeps existing custom suggestion dropdowns and field-fill behavior.
             */
            function loadGooglePlacesLibrary() {
                if (window.google && window.google.maps && window.google.maps.places) {
                    return Promise.resolve();
                }
                if (window.__wrrapdGooglePlacesPromise) return window.__wrrapdGooglePlacesPromise;
                window.__wrrapdGooglePlacesPromise = new Promise(function (resolve, reject) {
                    const existing = document.querySelector('script[data-wrrapd-google-places="1"]');
                    if (existing) {
                        existing.addEventListener('load', function () { resolve(); });
                        existing.addEventListener('error', function () { reject(new Error('Google Maps script failed to load')); });
                        return;
                    }
                    const script = document.createElement('script');
                    script.src =
                        'https://maps.googleapis.com/maps/api/js?key=' +
                        encodeURIComponent(GOOGLE_API_KEY) +
                        '&libraries=places&v=weekly';
                    script.async = true;
                    script.defer = true;
                    script.setAttribute('data-wrrapd-google-places', '1');
                    script.onload = function () { resolve(); };
                    script.onerror = function () { reject(new Error('Google Maps script failed to load')); };
                    document.head.appendChild(script);
                });
                return window.__wrrapdGooglePlacesPromise;
            }

            function setupGoogleAddressAutocomplete() {
                const line1 = document.getElementById('line1');
                const billingLine1 = document.getElementById('billing-line1');
                const line1List = document.getElementById('line1-suggestions');
                const billingList = document.getElementById('billing-line1-suggestions');

                const service = new google.maps.places.AutocompleteService();
                const detailsHost = document.createElement('div');
                const placesSvc = new google.maps.places.PlacesService(detailsHost);

                function fillFromPlace(place, mode) {
                    if (!place || !place.address_components) return;
                    let streetNumber = '';
                    let route = '';
                    let city = '';
                    let state = '';
                    let postal = '';
                    place.address_components.forEach(function (c) {
                        const types = c.types || [];
                        if (types.indexOf('street_number') !== -1) streetNumber = c.long_name || '';
                        if (types.indexOf('route') !== -1) route = c.long_name || '';
                        if (types.indexOf('locality') !== -1) city = c.long_name || '';
                        if (!city && types.indexOf('postal_town') !== -1) city = c.long_name || '';
                        if (!city && types.indexOf('sublocality') !== -1) city = c.long_name || '';
                        if (types.indexOf('administrative_area_level_1') !== -1) state = c.short_name || '';
                        if (types.indexOf('postal_code') !== -1) postal = c.long_name || '';
                    });
                    const line = [streetNumber, route].filter(Boolean).join(' ').trim();

                    if (mode === 'giftee') {
                        if (line) line1.value = line;
                        if (city) document.getElementById('city').value = city;
                        if (state) document.getElementById('state').value = state;
                        if (postal) document.getElementById('postal_code').value = postal.replace(/[^0-9-]/g, '').substring(0, 10);
                        syncBillingFromDeliveryIfLinked();
                        syncGifteeCityStateFromZip().then(function () {
                            updateGifteeZipOutsideDeliveryMessage();
                            if (typeof scheduleGifteeAddressValidation === 'function') scheduleGifteeAddressValidation();
                        });
                    } else {
                        if (line) billingLine1.value = line;
                        if (city) document.getElementById('billing-city').value = city;
                        if (state) document.getElementById('billing-state').value = state;
                        if (postal) document.getElementById('billing-postal_code').value = postal.replace(/[^0-9-]/g, '').substring(0, 10);
                        if (typeof scheduleBillingAddressValidation === 'function') scheduleBillingAddressValidation();
                    }
                }

                function setupPredictions(inputEl, listEl, mode) {
                    let debounce;
                    let seq = 0;
                    const hideList = function () {
                        listEl.hidden = true;
                        listEl.innerHTML = '';
                    };

                    inputEl.addEventListener('input', function () {
                        clearTimeout(debounce);
                        const q = inputEl.value.trim();
                        if (q.length < 2) {
                            hideList();
                            return;
                        }
                        debounce = setTimeout(function () {
                            const current = ++seq;
                            const token = new google.maps.places.AutocompleteSessionToken();
                            service.getPlacePredictions(
                                {
                                    input: q,
                                    sessionToken: token,
                                    componentRestrictions: { country: 'us' },
                                    types: ['address'],
                                },
                                function (predictions, status) {
                                    if (current !== seq) return;
                                    if (status !== google.maps.places.PlacesServiceStatus.OK || !predictions || !predictions.length) {
                                        hideList();
                                        return;
                                    }
                                    listEl.innerHTML = '';
                                    predictions.slice(0, 8).forEach(function (pred) {
                                        const li = document.createElement('li');
                                        li.setAttribute('role', 'option');
                                        li.textContent = pred.description || '';
                                        li.addEventListener('mousedown', function (e) {
                                            e.preventDefault();
                                            placesSvc.getDetails(
                                                {
                                                    placeId: pred.place_id,
                                                    sessionToken: token,
                                                    fields: ['address_components'],
                                                },
                                                function (place, detailsStatus) {
                                                    if (detailsStatus === google.maps.places.PlacesServiceStatus.OK) {
                                                        fillFromPlace(place, mode);
                                                    }
                                                }
                                            );
                                            hideList();
                                        });
                                        listEl.appendChild(li);
                                    });
                                    listEl.hidden = listEl.childNodes.length === 0;
                                }
                            );
                        }, 120);
                    });

                    inputEl.addEventListener('blur', function () {
                        setTimeout(hideList, 220);
                    });

                    inputEl.addEventListener('keydown', function (e) {
                        if (e.key === 'Escape') hideList();
                    });
                }

                setupPredictions(line1, line1List, 'giftee');
                setupPredictions(billingLine1, billingList, 'billing');
            }

            loadGooglePlacesLibrary()
                .then(function () {
                    setupGoogleAddressAutocomplete();
                })
                .catch(function (err) {
                    console.error('[checkout] Google Maps / Places failed to load:', err);
                    const w = document.getElementById('places-load-warning');
                    if (w) {
                        w.style.display = 'block';
                        w.textContent =
                            'Address suggestions are off (Google Maps JavaScript API / Places). You can still type the full street address. In Google Cloud Console, enable Maps JavaScript API + Places API and allow https://pay.wrrapd.com/* for this API key.';
                    }
                });

            ['name', 'line1', 'city', 'state', 'postal_code'].forEach(function (id) {
                const el = document.getElementById(id);
                if (!el) return;
                el.addEventListener('input', function () {
                    scheduleGifteeAddressValidation();
                    syncBillingFromDeliveryIfLinked();
                });
                el.addEventListener('change', function () {
                    scheduleGifteeAddressValidation();
                    syncBillingFromDeliveryIfLinked();
                });
                // Browser autofill / Places often commits without firing input; blur keeps billing in sync when linked.
                el.addEventListener('blur', function () {
                    syncBillingFromDeliveryIfLinked();
                });
                el.addEventListener('compositionend', function () {
                    syncBillingFromDeliveryIfLinked();
                });
            });

            document.getElementById('email').addEventListener('input', updatePayButtonState);
            phoneElement.addEventListener('input', updatePayButtonState);
            phoneElement.addEventListener('blur', function () {
                updatePayButtonState();
            });

            [
                'billing-name',
                'billing-line1',
                'billing-line2',
                'billing-city',
                'billing-state',
                'billing-postal_code',
            ].forEach(function (id) {
                const el = document.getElementById(id);
                if (!el) return;
                el.addEventListener('input', scheduleBillingAddressValidation);
                el.addEventListener('change', scheduleBillingAddressValidation);
            });

            scheduleGifteeAddressValidation();
            scheduleBillingAddressValidation();
            updatePayButtonState();

            const form = document.getElementById('payment-form');
            form.addEventListener('submit', async (event) => {
                event.preventDefault();

                if (wrrapdCheckoutDebug) {
                    console.log('[wrrapd checkout][debug] form submit event (button was enabled and clicked)');
                }

                // Check if session has expired before processing
                if (isSessionExpired()) {
                    handleSessionTimeout();
                    return;
                }

                // Disable submit button to prevent double submission
                const submitButton = document.getElementById('submit');
                submitButton.disabled = true;
                submitButton.textContent = 'Validating...';

                try {
                if (!cardElement || !clientSecret) {
                    alert('Payment form not fully loaded. Please wait a moment and try again.');
                    submitButton.textContent = 'Pay Now';
                    updatePayButtonState();
                    return;
                }

                // Email validation
                const email = document.getElementById('email').value;
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!emailRegex.test(email)) {
                    alert('Please enter a valid email address');
                        submitButton.textContent = 'Pay Now';
                        updatePayButtonState();
                    return;
                }

                if (!isPhoneOkForPay()) {
                    phoneElement.classList.add("error");
                    errorMsg.style.display = "block";
                    errorMsg.textContent = "Please enter a valid phone number";
                        submitButton.textContent = 'Pay Now';
                        updatePayButtonState();
                    return;
                }

                const phone = getPhoneE164OrBest();

                    // Delivery ZIP must be in allowed set — block Pay; outside area uses inline message only
                    const shippingZipCode = document.getElementById('postal_code').value;
                    const zipValidation = validateShippingZipCode(shippingZipCode);
                    if (!zipValidation.valid) {
                        const z = shippingZipCode.replace(/[^0-9]/g, '').substring(0, 5);
                        const isOutsideDelivery =
                            z.length === 5 && validZipCodes.size > 0 && !validZipCodes.has(z);
                        if (isOutsideDelivery) {
                            updateGifteeZipOutsideDeliveryMessage();
                            document.getElementById('postal_code').focus();
                        } else {
                            alert(zipValidation.message);
                            document.getElementById('postal_code').focus();
                        }
                        submitButton.textContent = 'Pay Now';
                        updatePayButtonState();
                        return;
                    }
                    updateGifteeZipOutsideDeliveryMessage();

                    // Validate Final shipping address
                    const finalShippingAddress = {
                    name: document.getElementById('name').value,
                        line1: document.getElementById('line1').value,
                        line2: document.getElementById('line2').value,
                        city: document.getElementById('city').value,
                        state: document.getElementById('state').value,
                        postal_code: document.getElementById('postal_code').value,
                        country: document.getElementById('country').value || 'US'
                    };

                    submitButton.textContent = 'Validating Final shipping address...';
                    const shippingValidation = await validateAddress(finalShippingAddress, 'Final shipping address');
                    
                    // Auto-correct address fields if corrections are available (do this regardless of validation result)
                    let hasCorrections = false;
                    if (shippingValidation.correctedComponents) {
                        const corrected = shippingValidation.correctedComponents;
                        const currentLine1 = document.getElementById('line1').value;
                        const currentPostal = document.getElementById('postal_code').value;
                        const currentCity = document.getElementById('city').value;
                        const currentState = document.getElementById('state').value;
                        const currentLine2 = document.getElementById('line2').value || '';
                        
                        if (corrected.postal_code && corrected.postal_code !== currentPostal) {
                            document.getElementById('postal_code').value = corrected.postal_code;
                            hasCorrections = true;
                        }
                        if (corrected.city && corrected.city !== currentCity) {
                            document.getElementById('city').value = corrected.city;
                            hasCorrections = true;
                        }
                        if (corrected.state && corrected.state !== currentState) {
                            document.getElementById('state').value = corrected.state;
                            hasCorrections = true;
                        }
                        if (corrected.line1 && corrected.line1 !== currentLine1) {
                            document.getElementById('line1').value = corrected.line1;
                            hasCorrections = true;
                        }
                        if (corrected.line2 !== undefined && corrected.line2 !== currentLine2) {
                            document.getElementById('line2').value = corrected.line2 || '';
                            hasCorrections = true;
                        }
                    }
                    
                    // If ZIP code correction suggested, update it
                    if (shippingValidation.suggestedZip) {
                        const currentPostal = document.getElementById('postal_code').value;
                        if (shippingValidation.suggestedZip !== currentPostal) {
                            document.getElementById('postal_code').value = shippingValidation.suggestedZip;
                            hasCorrections = true;
                        }
                    }

                    syncBillingFromDeliveryIfLinked();
                    
                    // Show confirmation message for auto-corrected fields
                    if (hasCorrections && shippingValidation.correctedComponents) {
                        const corrected = shippingValidation.correctedComponents;
                        // Show confirmation messages under corrected fields
                        if (corrected.line1 && document.getElementById('line1').value === corrected.line1) {
                            showFieldConfirmation('line1', 'Address has been corrected');
                        }
                        if ((corrected.postal_code && document.getElementById('postal_code').value === corrected.postal_code) || 
                            (shippingValidation.suggestedZip && document.getElementById('postal_code').value === shippingValidation.suggestedZip)) {
                            showFieldConfirmation('postal_code', 'ZIP code has been corrected');
                        }
                        if (corrected.city && document.getElementById('city').value === corrected.city) {
                            showFieldConfirmation('city', 'City has been corrected');
                        }
                        if (corrected.state && document.getElementById('state').value === corrected.state) {
                            showFieldConfirmation('state', 'State has been corrected');
                        }
                    }
                    
                    // If validation failed, check if it's just "inferred components" with corrections applied
                    // In that case, allow it to proceed to billing validation
                    if (!shippingValidation.valid) {
                        const isInferredComponentsOnly = shippingValidation.message && 
                                                         shippingValidation.message.includes('inferred components') &&
                                                         !shippingValidation.message.includes('ZIP code mismatch') &&
                                                         !shippingValidation.message.includes('Street address mismatch') &&
                                                         !shippingValidation.message.includes('PO Box');
                        
                        // If it's just inferred components and we applied corrections, allow proceeding to billing
                        if (isInferredComponentsOnly && hasCorrections) {
                            // Clear any error messages from Final shipping address
                            document.querySelectorAll('#payment-form .field-error:not(#billing-address-section .field-error)').forEach(el => el.remove());
                            document.querySelectorAll('#payment-form input:not(#billing-address-section input), #payment-form select:not(#billing-address-section select)').forEach(el => {
                                el.style.borderColor = '';
                                el.style.borderWidth = '';
                            });
                            // Proceed to billing validation
                        } else {
                            // Real validation error - block and show error
                            // Clear any previous errors from Final shipping address FIRST
                            document.querySelectorAll('#payment-form .field-error:not(#billing-address-section .field-error)').forEach(el => el.remove());
                            document.querySelectorAll('#payment-form input:not(#billing-address-section input), #payment-form select:not(#billing-address-section select)').forEach(el => {
                                el.style.borderColor = '';
                                el.style.borderWidth = '';
                            });
                            
                            // Show error message in the form field (AFTER auto-correction)
                            const errorField = shippingValidation.field || 'line1';
                            const fieldId = errorField === 'postal_code' ? 'postal_code' : 
                                             errorField === 'name' ? 'name' : 
                                             errorField === 'city' ? 'city' : 
                                             errorField === 'state' ? 'state' : 
                                             errorField === 'country' ? 'country' : 'line1';
                            const fieldElement = document.getElementById(fieldId);
                            
                            if (!fieldElement) {
                                return;
                            }
                            
                            // Check if field was auto-corrected - if ZIP was corrected, don't show stale ZIP mismatch error
                            if (errorField === 'postal_code' && shippingValidation.suggestedZip) {
                                const currentZip = document.getElementById('postal_code').value;
                                // If ZIP was corrected and now matches the suggestion, but error message still mentions old ZIP
                                if (currentZip === shippingValidation.suggestedZip && 
                                    shippingValidation.message && 
                                    shippingValidation.message.includes('ZIP code mismatch')) {
                                    // Extract the old ZIP from the error message
                                    const oldZipMatch = shippingValidation.message.match(/you entered (\d+)/);
                                    if (oldZipMatch && oldZipMatch[1] !== currentZip) {
                                        // This is a stale error - ZIP was already corrected
                                        // Don't show this error, validation will pass on next attempt
                                        fieldElement.style.borderColor = '';
                                        fieldElement.style.borderWidth = '';
                                        const staleErrorDiv = fieldElement.parentElement.querySelector('.field-error');
                                        if (staleErrorDiv) {
                                            staleErrorDiv.remove();
                                        }
                                        // Re-validate will happen on next click
                                        submitButton.textContent = 'Pay Now';
                                        updatePayButtonState();
                                        return;
                                    }
                                }
                            }
                            
                            // Add error styling
                            fieldElement.style.borderColor = '#dc3545';
                            fieldElement.style.borderWidth = '2px';
                            
                            // Show error message below field
                            let errorDiv = fieldElement.parentElement.querySelector('.field-error');
                            if (!errorDiv) {
                                errorDiv = document.createElement('div');
                                errorDiv.className = 'field-error';
                                errorDiv.style.color = '#dc3545';
                                errorDiv.style.fontSize = '14px';
                                errorDiv.style.marginTop = '5px';
                                errorDiv.style.fontWeight = 'bold';
                                fieldElement.parentElement.appendChild(errorDiv);
                            }
                            errorDiv.textContent = shippingValidation.message;
                            
                            fieldElement.focus();
                            submitButton.textContent = 'Pay Now';
                            updatePayButtonState();
                            return; // Require user to click 'Pay Now' again with corrected address
                        }
                    }
                    
                    // Clear any previous errors from Final shipping address (validation passed)
                    // Only clear Final shipping address errors, NOT billing address errors
                    // Use a more specific selector to avoid clearing billing errors
                    const finalShippingErrors = document.querySelectorAll('#payment-form .field-error');
                    finalShippingErrors.forEach(el => {
                        // Only remove if it's NOT inside the billing address section
                        if (!el.closest('#billing-address-section')) {
                            el.remove();
                        }
                    });
                    // Clear confirmation messages from Final shipping address (validation passed, corrections applied)
                    const finalShippingConfirmations = document.querySelectorAll('#payment-form .field-confirmation');
                    finalShippingConfirmations.forEach(el => {
                        // Only remove if it's NOT inside the billing address section
                        if (!el.closest('#billing-address-section')) {
                            el.remove();
                        }
                    });
                    // Clear border styles from Final shipping address fields only
                    const finalShippingFields = document.querySelectorAll('#payment-form input:not(#billing-address-section input), #payment-form select:not(#billing-address-section select)');
                    finalShippingFields.forEach(el => {
                        el.style.borderColor = '';
                        el.style.borderWidth = '';
                    });

                    // Determine billing address - use billing section if checkbox is unchecked, otherwise use Final shipping address
                    const useDefaultBilling = document.getElementById('use-default-address').checked;
                    
                    let billingAddress = null;
                    if (!useDefaultBilling) {
                        // Normalize country code to ISO format before validation
                        const billingCountryRaw = document.getElementById('billing-country').value || 'US';
                        const billingCountryNormalized = (billingCountryRaw === 'United States' || billingCountryRaw === 'USA') ? 'US' : 
                                                          (billingCountryRaw === 'Canada' || billingCountryRaw === 'CA') ? 'CA' : billingCountryRaw;
                        
                        billingAddress = {
                            name: document.getElementById('billing-name').value,
                            line1: document.getElementById('billing-line1').value,
                            line2: document.getElementById('billing-line2').value,
                            city: document.getElementById('billing-city').value,
                            state: document.getElementById('billing-state').value,
                            postal_code: document.getElementById('billing-postal_code').value,
                            country: billingCountryNormalized
                        };
                        
                        // Update the field with normalized value
                        document.getElementById('billing-country').value = billingCountryNormalized;

                        submitButton.textContent = 'Validating billing address...';
                        const billingValidation = await validateAddress(billingAddress, 'Billing address');
                        if (!billingValidation.valid) {
                            // Clear any previous errors from billing address FIRST
                            document.querySelectorAll('#billing-address-section .field-error').forEach(el => el.remove());
                            document.querySelectorAll('#billing-address-section input, #billing-address-section select').forEach(el => {
                                el.style.borderColor = '';
                                el.style.borderWidth = '';
                            });
                            
                            // Auto-correct billing fields when Google suggests corrections (billing ZIP is not limited to delivery area)
                            let hasBillingCorrections = false;
                            if (billingValidation.correctedComponents) {
                                const corrected = billingValidation.correctedComponents;
                                if (corrected.postal_code) {
                                    document.getElementById('billing-postal_code').value = corrected.postal_code;
                                    hasBillingCorrections = true;
                                }
                                if (corrected.city) {
                                    document.getElementById('billing-city').value = corrected.city;
                                    hasBillingCorrections = true;
                                }
                                if (corrected.state) {
                                    document.getElementById('billing-state').value = corrected.state;
                                    hasBillingCorrections = true;
                                }
                                if (corrected.line1) {
                                    document.getElementById('billing-line1').value = corrected.line1;
                                    hasBillingCorrections = true;
                                }
                                if (corrected.line2 !== undefined) {
                                    document.getElementById('billing-line2').value = corrected.line2 || '';
                                    hasBillingCorrections = true;
                                }
                            }
                            
                            if (hasBillingCorrections && billingValidation.correctedComponents) {
                                const corrected = billingValidation.correctedComponents;
                                if (corrected.line1) {
                                    showFieldConfirmation('billing-line1', 'Address has been corrected');
                                }
                                if (corrected.postal_code) {
                                    showFieldConfirmation('billing-postal_code', 'ZIP code has been corrected');
                                }
                                if (corrected.city) {
                                    showFieldConfirmation('billing-city', 'City has been corrected');
                                }
                                if (corrected.state) {
                                    showFieldConfirmation('billing-state', 'State has been corrected');
                                }
                            }
                            
                            if (billingValidation.message && (billingValidation.message.includes('ZIP code') || billingValidation.field === 'postal_code')) {
                                billingValidation.message = 'Please verify the billing ZIP code and address.';
                            }
                            
                            // Show error message in the form field (AFTER auto-correction)
                            // Map field names - validateAddress returns 'line1', 'postal_code', etc. without 'billing-' prefix
                            let errorField = billingValidation.field || 'line1';
                            // Always add 'billing-' prefix for billing address fields
                            if (!errorField.startsWith('billing-')) {
                                errorField = 'billing-' + errorField;
                            }
                            
                            const fieldId = errorField === 'billing-postal_code' ? 'billing-postal_code' : 
                                               errorField === 'billing-name' ? 'billing-name' : 
                                               errorField === 'billing-city' ? 'billing-city' : 
                                               errorField === 'billing-state' ? 'billing-state' : 
                                               errorField === 'billing-country' ? 'billing-country' : 
                                               'billing-line1';
                            
                            // CRITICAL: Use querySelector within billing section to ensure we get the right field
                            const billingSection = document.getElementById('billing-address-section');
                            let fieldElement = null;
                            if (billingSection) {
                                fieldElement = billingSection.querySelector(`#${fieldId}`);
                            }
                            // Fallback to getElementById if not found in section
                            if (!fieldElement) {
                                fieldElement = document.getElementById(fieldId);
                            }
                            
                            if (!fieldElement) {
                                fieldElement = billingSection ? billingSection.querySelector('#billing-line1') : document.getElementById('billing-line1');
                            }
                            
                            // CRITICAL: Ensure we're using the field from within the billing address section
                            // Re-fetch the field element from within billing section to ensure it's the correct one
                            if (!billingSection) {
                                submitButton.textContent = 'Pay Now';
                                updatePayButtonState();
                                return;
                            }
                            
                            // Always get the field from within the billing section FIRST
                            let correctFieldElement = billingSection.querySelector(`#${fieldId}`);
                            if (!correctFieldElement) {
                                correctFieldElement = document.getElementById(fieldId);
                                // Double-check it's actually in the billing section
                                if (correctFieldElement && !billingSection.contains(correctFieldElement)) {
                                    correctFieldElement = billingSection.querySelector('#billing-line1');
                                }
                            }
                            
                            if (!correctFieldElement) {
                                correctFieldElement = billingSection.querySelector('#billing-line1') || document.getElementById('billing-line1');
                            }
                            
                            // Verify the field is in the billing section
                            if (correctFieldElement && billingSection && !billingSection.contains(correctFieldElement)) {
                                // Force find it in billing section
                                const forcedField = billingSection.querySelector(`input[id*="${errorField.replace('billing-', '')}"]`);
                                if (forcedField) {
                                    correctFieldElement = forcedField;
                                } else {
                                    submitButton.textContent = 'Pay Now';
                                    updatePayButtonState();
                                    return;
                                }
                            }
                            
                            // Use the correct field element
                            fieldElement = correctFieldElement;
                            
                            // Check if field was auto-corrected - if ZIP was corrected, don't show stale ZIP mismatch error
                            if (errorField === 'billing-postal_code' && billingValidation.suggestedZip) {
                                const currentZip = document.getElementById('billing-postal_code').value;
                                // If ZIP was corrected and now matches the suggestion, but error message still mentions old ZIP
                                if (currentZip === billingValidation.suggestedZip && 
                                    billingValidation.message && 
                                    billingValidation.message.includes('ZIP code mismatch')) {
                                    // Extract the old ZIP from the error message
                                    const oldZipMatch = billingValidation.message.match(/you entered (\d+)/);
                                    if (oldZipMatch && oldZipMatch[1] !== currentZip) {
                                        // This is a stale error - ZIP was already corrected
                                        // Don't show this error, validation will pass on next attempt
                                        fieldElement.style.borderColor = '';
                                        fieldElement.style.borderWidth = '';
                                        const staleErrorDiv = fieldElement.parentElement.querySelector('.field-error');
                                        if (staleErrorDiv) {
                                            staleErrorDiv.remove();
                                        }
                                        // Re-validate will happen on next click
                                        submitButton.textContent = 'Pay Now';
                                        updatePayButtonState();
                                        return;
                                    }
                                }
                            }
                            
                            // Add error styling to the correct field (ONLY after we've verified it's in billing section)
                            fieldElement.style.borderColor = '#dc3545';
                            fieldElement.style.borderWidth = '2px';
                            
                            // Show appropriate error message for billing address
                            let billingErrorMessage = 'Please re-check your Billing address.';
                            
                            if (billingValidation.message && (billingValidation.message.includes('ZIP code') || billingValidation.field === 'postal_code')) {
                                billingErrorMessage = 'Please verify the billing ZIP code and address.';
                            } else if (billingValidation.message && !billingValidation.message.includes('ZIP code')) {
                                // Use the validation message if it's not about ZIP code
                                billingErrorMessage = billingValidation.message;
                            }
                            
                            // Show error message below the correct field
                            let errorDiv = fieldElement.parentElement.querySelector('.field-error');
                            if (!errorDiv) {
                                errorDiv = document.createElement('div');
                                errorDiv.className = 'field-error';
                                errorDiv.style.color = '#dc3545';
                                errorDiv.style.fontSize = '14px';
                                errorDiv.style.marginTop = '5px';
                                errorDiv.style.fontWeight = 'bold';
                                fieldElement.parentElement.appendChild(errorDiv);
                            }
                            errorDiv.textContent = billingErrorMessage;
                            
                            fieldElement.focus();
                            submitButton.textContent = 'Pay Now';
                            updatePayButtonState();
                            return; // Require user to click 'Pay Now' again with corrected address
                        }
                        
                        // Clear any previous errors and confirmations from billing address (validation passed)
                        document.querySelectorAll('#billing-address-section .field-error').forEach(el => el.remove());
                        document.querySelectorAll('#billing-address-section .field-confirmation').forEach(el => el.remove());
                        document.querySelectorAll('#billing-address-section input, #billing-address-section select').forEach(el => {
                            el.style.borderColor = '';
                            el.style.borderWidth = '';
                        });
                    }

                    // All validations passed — confirm card payment with Stripe.js (Card Element on this page)
                    if (!useDefaultBilling && !billingAddress) {
                        alert('Billing address is required. Please fill in all billing address fields.');
                        submitButton.textContent = 'Pay Now';
                        updatePayButtonState();
                        return;
                    }

                    submitButton.textContent = 'Processing payment...';

                    let cardZipCode = '';
                    if (useDefaultBilling) {
                        cardZipCode = (document.getElementById('postal_code').value || '').replace(/[^0-9]/g, '').substring(0, 5);
                    } else {
                        cardZipCode = (document.getElementById('billing-postal_code').value || '').replace(/[^0-9]/g, '').substring(0, 5);
                    }

                    const billingDetails = {
                        name: useDefaultBilling ? finalShippingAddress.name : (billingAddress ? billingAddress.name : ''),
                        email: email,
                        phone: phone,
                        address: {
                            line1: useDefaultBilling ? finalShippingAddress.line1 : (billingAddress ? billingAddress.line1 : ''),
                            line2: useDefaultBilling ? (finalShippingAddress.line2 || '') : (billingAddress ? (billingAddress.line2 || '') : ''),
                            city: useDefaultBilling ? finalShippingAddress.city : (billingAddress ? billingAddress.city : ''),
                            state: useDefaultBilling ? finalShippingAddress.state : (billingAddress ? billingAddress.state : ''),
                            postal_code: cardZipCode,
                            country: useDefaultBilling ? finalShippingAddress.country : (billingAddress ? billingAddress.country : 'US')
                        }
                    };

                    const finalShippingAddressForServer = {
                        name: finalShippingAddress.name,
                        street: finalShippingAddress.line1 + (finalShippingAddress.line2 ? ' ' + finalShippingAddress.line2 : ''),
                        city: finalShippingAddress.city,
                        state: finalShippingAddress.state,
                        postalCode: finalShippingAddress.postal_code,
                        country: finalShippingAddress.country
                    };

                    try {
                        await fetch('https://api.wrrapd.com/api/store-final-shipping-address', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                orderNumber: orderNumber,
                                finalShippingAddress: finalShippingAddressForServer
                            })
                        });
                    } catch (error) {
                        /* non-blocking: server may be unavailable */
                    }

                    const { paymentIntent, error: stripeError } = await stripe.confirmCardPayment(clientSecret, {
                        payment_method: {
                            card: cardElement,
                            billing_details: billingDetails,
                        }
                    });

                    if (stripeError) {
                        alert(`Payment failed: ${stripeError.message}`);
                        submitButton.textContent = 'Pay Now';
                        updatePayButtonState();
                        return;
                    }

                    if (window.opener) {
                        window.opener.postMessage({
                            status: 'success',
                            paymentIntentId: paymentIntent.id,
                            customerEmail: email,
                            customerPhone: phone
                        }, '*');
                    }
                    window.location.href = '/success';
                } catch (error) {
                    alert(`Payment could not complete: ${error.message || error}. If this persists, check your network connection and try again.`);
                    submitButton.textContent = 'Pay Now';
                    updatePayButtonState();
                }
            });
        }

        function waitForStripeAndInitialize() {
            if (typeof Stripe !== 'undefined') {
                if (document.readyState === 'loading') {
                    document.addEventListener('DOMContentLoaded', initializeCheckoutPage);
                } else {
                    initializeCheckoutPage();
                }
            } else {
                setTimeout(waitForStripeAndInitialize, 100);
            }
        }
        waitForStripeAndInitialize();
    </script>
</body>
</html>
