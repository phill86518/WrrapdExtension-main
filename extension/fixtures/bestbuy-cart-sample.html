<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Best Buy Cart Sample</title>
  </head>
  <body>
    <main data-testid="cart-root">
      <section data-testid="cart-line-item" data-track="line-item">
        <a data-track="line-item-title" href="/site/sony-wh-1000xm5/6505727.p?skuId=6505727">
          Sony WH-1000XM5 Wireless Noise Canceling Headphones
        </a>
        <div data-testid="cart-line-item-price">$399.99</div>
        <div data-track="line-item-quantity">Qty: 1</div>
        <div>Ship it</div>
      </section>

      <section data-testid="cart-line-item" data-track="line-item">
        <a data-track="line-item-title" href="/site/apple-airpods-pro-2/4900964.p?skuId=4900964">
          Apple AirPods Pro 2
        </a>
        <div data-testid="cart-line-item-price">$249.99</div>
        <div data-track="line-item-quantity">Quantity 2</div>
        <div>Ready for pickup</div>
      </section>

      <section class="order-summary" data-testid="cart-order-summary">
        <div data-track="order-summary-subtotal">Subtotal: $899.97</div>
        <div data-track="order-summary-total">Total: $899.97</div>
      </section>
    </main>
  </body>
</html>
