<!DOCTYPE html>
<!-- Dev fixture: trimmed snapshot of a logged-in Ulta /bag page (pickup item) for selector work. -->
<html lang="en-US">
  <head>
    <meta charset="utf-8" />
    <title>Ulta bag — Wrrapd fixture</title>
  </head>
  <body>
    <main id="MainWrapper">
      <div class="GridContainer__content">
        <!-- Left column: bag items -->
        <div class="BagHeader">
          <h1 class="Text-ds Text-ds--title-5">Bag</h1>
          <p class="Text-ds Text-ds--body-2">1 item</p>
        </div>
        <div class="BagItemsSplit">
          <ul class="BagItemsSplit__moduleList">
            <li class="BagItemsSplit__module">
              <section class="BagSection">
                <ul class="DeliveryGroup__itemList">
                  <li class="DeliveryGroup__item">
                    <div class="BagProductCardSplit" role="group" aria-label="product">
                      <div class="BagProductCardSplit__ProductDetailsContainer">
                        <div class="BagProductCardProductImage__Image">
                          <a
                            class="pal-c-Link"
                            href="https://www.ulta.com/p/birthday-gift-dermalogica-dynamic-skin-recovery-spf50-deluxe-sample-gwp4379114724?sku=2648210"
                          >
                            <img alt="" src="https://media.ultainc.com/i/ulta/2648210?w=100&h=100" />
                          </a>
                        </div>
                        <div class="BagProductCardDetails">
                          <div class="BagProductCardDetails__ProductDetails">
                            <a
                              class="pal-c-Link"
                              href="https://www.ulta.com/p/birthday-gift-dermalogica-dynamic-skin-recovery-spf50-deluxe-sample-gwp4379114724?sku=2648210"
                            >
                              <div class="pal-c-Link__label">
                                <span class="Text-ds Text-ds--body-2 Text-ds--left Text-ds--neutral-600"
                                  >Ulta Beauty Rewards</span
                                >
                                <h3 class="Text-ds Text-ds--body-2 Text-ds--left Text-ds--black">
                                  Birthday Gift - Dermalogica Dynamic Skin Recovery SPF50 deluxe sample
                                </h3>
                              </div>
                            </a>
                          </div>
                        </div>
                      </div>
                      <div class="BagProductCardPrice">
                        <span class="Text-ds Text-ds--body-1">$15.00</span>
                      </div>
                    </div>
                  </li>
                </ul>
              </section>
            </li>
          </ul>
        </div>

        <!-- Right column: gifting + summary + checkout -->
        <div class="GiftingV2">
          <div class="IconTitleAction">
            <p class="Text-ds Text-ds--title-sm">Make this order a gift</p>
            <p class="Text-ds Text-ds--body-2">Gifting unavailable for pickup</p>
          </div>
        </div>
        <div class="OrderSummary">
          <div class="OrderSummary__container">
            <h2 class="Text-ds Text-ds--title-6">Order summary</h2>
            <ul class="OrderSummary__List">
              <li class="OrderSummaryLineItem">
                <span>Subtotal (1 item)</span><span>$15.00</span>
              </li>
              <li class="OrderSummary__estimatedTotal">
                <span><strong>Estimated total</strong></span><span><strong>$15.00</strong></span>
              </li>
            </ul>
          </div>
        </div>
        <div class="CartActions CartActions__isSticky">
          <div class="CartActions__ActionsContainer">
            <button class="pal-c-Button CartActions__CheckoutButton" type="button">
              <span class="pal-c-Button__text">Checkout</span>
            </button>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
